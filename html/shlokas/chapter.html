<script>
function goBack() { 
    window.history.back(); 
}

/* Dynamic Canonical + OG Update */
(function () {
    const params = new URLSearchParams(window.location.search);
    const chapter = params.get("chapter");

    if (chapter) {
        const base = "https://gita-verse.com/html/shlokas/chapter.html";
        const fullUrl = `${base}?chapter=${chapter}`;

        document.getElementById("canonical-link").href = fullUrl;
        document.getElementById("og-url").setAttribute("content", fullUrl);

        document.title = `Bhagavad Gita – Chapter ${chapter} Commentary & Verses`;
    }
})();
</script>
